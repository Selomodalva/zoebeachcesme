<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoe Rules</title>
  <style>
    :root {
      --bg: #f6efe3;
      --ink: #1f2a2e;
      --accent: #b53d24;
      --accent-dark: #8e2f1b;
      --card: rgba(255, 252, 246, 0.86);
      --line: rgba(31, 42, 46, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(181, 61, 36, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(62, 112, 89, 0.16), transparent 28%),
        linear-gradient(135deg, #fbf6ee 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 40px 28px;
      box-shadow: 0 24px 80px rgba(31, 42, 46, 0.12);
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(31, 42, 46, 0.72);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 4.6rem);
      line-height: 0.95;
    }

    p {
      margin: 18px 0 0;
      font-size: 1.08rem;
      line-height: 1.65;
      max-width: 54ch;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
    }

    .button.primary {
      color: #fffdf8;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      box-shadow: 0 12px 28px rgba(181, 61, 36, 0.24);
    }

    .button.secondary {
      color: var(--ink);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }

    .direct-link {
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      font-size: 0.98rem;
    }

    .direct-link a {
      color: var(--accent-dark);
      word-break: break-word;
    }

    @media (max-width: 560px) {
      main {
        padding: 30px 22px;
        border-radius: 20px;
      }

      .actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Official Document</p>
    <h1>Zoe Rules</h1>
    <p>
      Use the buttons below to open the full rule set as a PDF or download a copy for offline viewing.
    </p>

    <div class="actions">
      <a class="button primary" href="./Zoe%20Rules.pdf" target="_blank" rel="noopener noreferrer">Open the PDF</a>
      <a class="button secondary" href="./Zoe%20Rules.pdf" download>Download PDF</a>
    </div>

    <p class="direct-link">
      Direct PDF file:
      <a href="./Zoe%20Rules.pdf" target="_blank" rel="noopener noreferrer">Zoe Rules.pdf</a>
    </p>
  </main>
</body>
</html>
